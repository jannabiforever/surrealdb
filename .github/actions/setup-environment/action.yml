name: 'Setup environment'
description: 'Install Rust toolchain, checkout sources, and setup cache'

inputs:
  toolchain:
    description: 'Rust toolchain version'
    required: false
    default: stable
  components:
    description: 'Additional Rust components to install (space-separated)'
    required: false
    default: ''
  targets:
    description: 'Additional targets to install (space-separated)'
    required: false
    default: ''
  cache-key:
    description: 'Additional cache key suffix'
    required: false
    default: ''
  save-cache:
    description: 'Whether to save cache (typically only on main branch)'
    required: false
    default: 'false'
  workspaces:
    description: 'Workspaces to cache (multi-line string)'
    required: false
    default: ''
  cache-directories:
    description: 'Additional cache directories'
    required: false
    default: ''
  free-disk-space:
    description: 'Whether to free disk space by removing pre-installed software'
    required: false
    default: 'true'
  enable-sccache:
    description: 'Whether to compile via sccache (RUSTC_WRAPPER)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Free disk space
      # The cleanup commands are Linux-specific (sudo + GNU paths). Running them
      # on macOS/Windows runners only produces noise (read-only volume / missing
      # sudo), so restrict the step to Linux where it actually frees space.
      if: inputs.free-disk-space == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        echo "Disk space before cleanup:"
        df -h /

        echo "Removing unnecessary software..."

        # Large language runtimes and toolchains
        sudo rm -rf /usr/share/swift || true
        sudo rm -rf /usr/lib/jvm || true
        sudo rm -rf /opt/maven || true
        sudo rm -rf /usr/share/gradle* || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        sudo rm -rf /opt/hostedtoolcache/CodeQL || true
        sudo rm -rf /usr/local/share/powershell || true
        sudo rm -rf /usr/local/share/vcpkg || true
        sudo rm -rf /usr/share/miniconda || true
        sudo rm -rf /usr/share/mono || true
        sudo rm -rf /var/lib/snapd || true

        # Browsers and drivers
        sudo rm -rf /usr/local/share/chromium || true
        sudo rm -rf /usr/local/share/gecko_driver || true
        sudo rm -rf /opt/microsoft/msedge || true

        # Docs and manuals
        sudo rm -rf /usr/share/doc || true
        sudo rm -rf /usr/share/man || true

        # Cloud tools
        sudo rm -rf /usr/share/az_* || true

        # Clean Docker
        sudo docker image prune --all --force || true

        # Clean apt cache
        sudo apt-get clean || true

        echo "Disk space after cleanup:"
        df -h /

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Configure AWS creds for sccache
      if: inputs.enable-sccache == 'true'
      shell: bash
      run: |
        # Materialize the AWS credentials the CLI resolves (static env keys, a
        # profile, or an instance role's STS session token) into env vars that
        # the sccache S3 backend can read. Must run before sccache-action starts
        # the daemon below, since the daemon reads its creds at start time.
        # env-no-export emits bare NAME=VALUE lines (the plain `env` format emits
        # `export NAME=VALUE`, which $GITHUB_ENV cannot parse).
        # Skipped on fork PRs (no SCCACHE_BUCKET) → sccache falls back to local.
        # Non-fatal: if no creds resolve (e.g. the dedicated SCCACHE_AWS_* secrets
        # aren't set yet), don't fail the job — the sccache probe below then finds
        # the backend unreachable and compiles uncached.
        if [[ -n "$SCCACHE_BUCKET" ]]; then
          aws configure export-credentials --format env-no-export >> "$GITHUB_ENV" \
            || echo "::warning title=sccache::no AWS credentials resolved; compiling without the cache"
        fi

    - name: Setup sccache
      if: inputs.enable-sccache == 'true'
      uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10

    - name: Configure sccache environment
      if: inputs.enable-sccache == 'true'
      shell: bash
      run: |
        # The sccache S3 backend (SCCACHE_BUCKET + AWS_* creds) is configured at
        # the workflow level and read when the server starts. Probe it by starting
        # the server explicitly: only enable RUSTC_WRAPPER if the backend is
        # actually reachable. If it isn't — missing S3 perms, a bucket outage, or
        # a fork PR with no creds — compile *uncached* rather than failing every
        # rustc invocation (sccache treats a backend it can't read as fatal).
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
        sccache --stop-server >/dev/null 2>&1 || true
        if sccache --start-server; then
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "sccache backend reachable — compiler cache enabled"
        else
          echo "::warning title=sccache disabled::sccache server failed to start (cache backend unreachable); compiling without the cache"
        fi

    - name: Setup cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        save-if: ${{ inputs.save-cache }}
        shared-key: ${{ inputs.cache-key }}
        workspaces: ${{ inputs.workspaces }}
        cache-directories: ${{ inputs.cache-directories }}
        cache-targets: false
