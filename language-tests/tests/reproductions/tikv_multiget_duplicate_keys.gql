/**
[env]
namespace = true
database = true
imports = ["opengql/_schema.surql"]

[test]
reason = "TiKV-only regression in the KV-layer multi-get. The OpenGQL MATCH executor recovers edge endpoints by batching the endpoint record ids of the whole binding table into one `get_records` → `getm` call; when two patterns share a far node, the SAME node id appears multiple times in that batch. The TiKV `getm` rebuilt result order through a `HashMap<&[u8], usize>` keyed on key bytes, which collapsed duplicate keys to a single position and left the other positions empty — the shared node lost its `id`, its rows dropped from the HashJoin, and this edge-anchored shared-far-node MATCH returned `[]` on tikv [all-ro]/[best-effort-ro]. mem/rocksdb/surrealkv return one value per input key position (duplicates included), so they were unaffected. Minimal mirror of opengql/edge_anchored; guards the fix in kvs/tikv `getm` (fans each result out to every requesting position). Surfaced by PR #368 once PR #412 unmasked the tikv language tests."

[[test.results]]
value = "[{ a: 'B', b: 'A', c: 'C' }, { a: 'C', b: 'A', c: 'B' }]"
*/

-- Two patterns share the far node `b`; planned edge-first, both endpoints are
-- recovered in one batched multi-get, so `b`'s record id is fetched more than
-- once in a single batch — the duplicate-key case that TiKV `getm` dropped.
MATCH (a)-[:knows]->(b), (c)-[:knows]->(b)
RETURN a.name AS a, b.name AS b, c.name AS c ORDER BY a, c
