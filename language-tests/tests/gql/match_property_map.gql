/**
[env]
namespace = true
database = true
imports = ["gql/_schema.surql"]

[test]
reason = "Property-map sugar: {city: 'London'} is an equality conjunct on the element; equality with a non-null literal needs no guard."

[[test.results]]
value = "[{ name: 'A' }, { name: 'C' }]"
*/

MATCH (n:person {city: 'London'}) RETURN n.name AS name ORDER BY name
