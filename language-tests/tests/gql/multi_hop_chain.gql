/**
[env]
namespace = true
database = true
imports = ["gql/_schema.surql"]

[test]
reason = "Multi-hop path pattern (PR-B flip): v1/PR-A rejected more than one edge step; the chain now lowers whole and the planner chains the Expands. Over the person-only knows graph (1->2, 2->1, 2->3, 3->1) the 2-hop chains are 1->2->1, 1->2->3, 2->1->2, 2->3->1, 3->1->2."

[[test.results]]
value = "[{ a: 'A', c: 'A' }, { a: 'A', c: 'C' }, { a: 'B', c: 'A' }, { a: 'B', c: 'B' }, { a: 'C', c: 'B' }]"
*/

MATCH (a:person)-[:knows]->(b:person)-[:knows]->(c:person)
RETURN a.name AS a, c.name AS c ORDER BY a, c
