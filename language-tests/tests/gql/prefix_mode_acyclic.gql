[test]
reason = "Path mode `ACYCLIC`: no repeated node at all (not even closing on the start). On the triangle Dâ†’Eâ†’Fâ†’D anchored at D the close back to D is rejected, so only Dâ†’E and Dâ†’Eâ†’F survive â€” two rows (E, F), vs three for SIMPLE."

[[test.results]]
