/**
[env]
namespace = true
database = true
imports = ["gql/_schema.surql"]

[test]
reason = "V2_DESIGN R6: the `+` quantifier is `{1,}` — one-or-more hops, one row per path, terminating via edge-uniqueness within a path. In v1 `+` was a lowering rejection ('The `+` quantifier is not supported yet'); v2 supports it. Same paths as `*` minus the zero-length depth-0 row: on the triangle each source reaches all three hubs exactly once across depths 1..3. 9 rows."

[[test.results]]
value = "[{ an: 'D', bn: 'D' }, { an: 'D', bn: 'E' }, { an: 'D', bn: 'F' }, { an: 'E', bn: 'D' }, { an: 'E', bn: 'E' }, { an: 'E', bn: 'F' }, { an: 'F', bn: 'D' }, { an: 'F', bn: 'E' }, { an: 'F', bn: 'F' }]"
*/

MATCH (a:hub)-[:link]->+(b:hub) RETURN a.name AS an, b.name AS bn ORDER BY an, bn
