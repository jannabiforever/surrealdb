/**
[env]
namespace = true
database = true
imports = ["gql/_schema.surql"]

[test]
reason = "V2_DESIGN R4 / §8 flip: a quantified edge that declares a variable is legal and binds an EdgeGroup. In v1 this was a lowering rejection ('Variable-length edge patterns cannot declare an edge variable'); v2 supports it because PathExpand has a real per-path edge list to bind. `{2}` on the triangle gives exactly the two-hop paths, each with a two-element group in path order: D->E->F grp=[l45,l56]; E->F->D grp=[l56,l64]; F->D->E grp=[l64,l45]. 3 rows."

[[test.results]]
value = "[{ an: 'D', bn: 'F', grp: [{ id: link:l45, in: hub:4, out: hub:5, since: 2014 }, { id: link:l56, in: hub:5, out: hub:6, since: 2015 }] }, { an: 'E', bn: 'D', grp: [{ id: link:l56, in: hub:5, out: hub:6, since: 2015 }, { id: link:l64, in: hub:6, out: hub:4, since: 2016 }] }, { an: 'F', bn: 'E', grp: [{ id: link:l64, in: hub:6, out: hub:4, since: 2016 }, { id: link:l45, in: hub:4, out: hub:5, since: 2014 }] }]"
*/

MATCH (a:hub)-[g:link]->{2}(b:hub) RETURN a.name AS an, b.name AS bn, g AS grp ORDER BY an, bn
