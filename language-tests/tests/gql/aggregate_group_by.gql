/**
[env]
namespace = true
database = true
imports = ["gql/_schema.surql"]

[test]
reason = "GROUP BY a grouping key with count(*): one row per distinct a.name with the number of person->person knows edges leaving it (A->B; B->A,C; C->A)."

[[test.results]]
value = "[{ c: 1, name: 'A' }, { c: 2, name: 'B' }, { c: 1, name: 'C' }]"
*/

MATCH (a:person)-[:knows]->(b:person) RETURN a.name AS name, count(*) AS c GROUP BY a.name ORDER BY name
