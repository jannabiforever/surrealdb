/**
[env]
namespace = true
database = true
imports = ["gql/_schema.surql"]

[test]
reason = "ANY SHORTEST with a `*` (min 0) quantifier: the zero-length path makes the source its own shortest terminal at depth 0, so X appears alongside one shortest path to each other reachable waypoint (Y1/Y2/Y3 at 1, Y4/Z at 2) — six rows."

[[test.results]]
value = "[{ an: 'X', bn: 'X' }, { an: 'X', bn: 'Y1' }, { an: 'X', bn: 'Y2' }, { an: 'X', bn: 'Y3' }, { an: 'X', bn: 'Y4' }, { an: 'X', bn: 'Z' }]"
*/

MATCH ANY SHORTEST (a:wp WHERE a.name = 'X')-[:road]->*(b:wp)
RETURN a.name AS an, b.name AS bn ORDER BY an, bn
