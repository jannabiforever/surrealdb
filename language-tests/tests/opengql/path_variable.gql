/**
[env]
namespace = true
database = true
imports = ["opengql/_schema.surql"]

[test]
reason = "V2_DESIGN R5 + R8 / §8 flip: path variables are supported. In v1 `MATCH p = ...` was a lowering rejection ('Path variables are not supported yet'); v2 supports them via PathExpand. This pins the single-hop {1} path value (R5: a 3-element alternating [node, edge, node] array of full records) AND R8 `RETURN *` expanding to all user-named bindings alphabetically — here a, b, g (the EdgeGroup), p (the Path). On the triangle {1} each source has exactly one out-edge: D->E, E->F, F->D."

[[test.results]]
value = "[{ a: { age: 40, id: hub:4, name: 'D' }, b: { age: 50, id: hub:5, name: 'E' }, g: [{ id: link:l45, in: hub:4, out: hub:5, since: 2014 }], p: [{ age: 40, id: hub:4, name: 'D' }, { id: link:l45, in: hub:4, out: hub:5, since: 2014 }, { age: 50, id: hub:5, name: 'E' }] }, { a: { age: 50, id: hub:5, name: 'E' }, b: { age: 60, id: hub:6, name: 'F' }, g: [{ id: link:l56, in: hub:5, out: hub:6, since: 2015 }], p: [{ age: 50, id: hub:5, name: 'E' }, { id: link:l56, in: hub:5, out: hub:6, since: 2015 }, { age: 60, id: hub:6, name: 'F' }] }, { a: { age: 60, id: hub:6, name: 'F' }, b: { age: 40, id: hub:4, name: 'D' }, g: [{ id: link:l64, in: hub:6, out: hub:4, since: 2016 }], p: [{ age: 60, id: hub:6, name: 'F' }, { id: link:l64, in: hub:6, out: hub:4, since: 2016 }, { age: 40, id: hub:4, name: 'D' }] }]"
*/

MATCH p = (a:hub)-[g:link]->{1}(b:hub) RETURN * ORDER BY a
