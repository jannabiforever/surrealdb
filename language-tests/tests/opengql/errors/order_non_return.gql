/**
[test]
reason = "Lowering rejection: sort keys must match a RETURN item; the legacy engine sorts projected output rows while the streaming engine resolves source fields, so any other key would behave differently per planner strategy."

[test.results]
parsing-error = '''
ORDER BY may only reference RETURN items
  --> [15:49]
   |
15 | MATCH (n:person) RETURN n.name AS name ORDER BY n.age
   |                                                 ^^^^^ return the sort expression under an alias and order by the alias
'''
*/

MATCH (n:person) RETURN n.name AS name ORDER BY n.age
