/**
[env]
namespace = true
database = true
imports = ["opengql/_schema.surql"]

[test]
reason = "Variable-length {1,3}: v1 semantics are distinct reachable nodes at depths 1..3 (documented deviation from one-row-per-path); on the cyclic person graph every person reaches every person."

[[test.results]]
value = "[{ an: 'A', bn: 'A' }, { an: 'A', bn: 'B' }, { an: 'A', bn: 'C' }, { an: 'B', bn: 'A' }, { an: 'B', bn: 'B' }, { an: 'B', bn: 'C' }, { an: 'C', bn: 'A' }, { an: 'C', bn: 'B' }, { an: 'C', bn: 'C' }]"
*/

MATCH (a:person)-[:knows]->{1,3}(b:person) RETURN a.name AS an, b.name AS bn ORDER BY an, bn
