/**
[env]
namespace = true
database = true
imports = ["opengql/_schema.surql"]

[test]
reason = "OPTIONAL MATCH, OptionalExpand fast path (V2_DESIGN §5/§6, worked tree iii): a single single-hop optional clause whose source `a` is bound by the mandatory clause compiles to Expand{optional:true}. Every person matches at least one knows->person edge, so all three persons surface, one row per matched `b`."

[[test.results]]
value = "[{ name: 'A' }, { name: 'B' }, { name: 'B' }, { name: 'C' }]"

*/

MATCH (a:person) OPTIONAL MATCH (a)-[:knows]->(b:person) RETURN a.name AS name ORDER BY name
