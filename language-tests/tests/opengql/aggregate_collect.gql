/**
[env]
namespace = true
database = true
imports = ["opengql/_schema.surql"]

[test]
reason = "collect(x) maps onto array::group, gathering each group's values into a list. Per source person, the names of the person nodes it knows."

[[test.results]]
value = "[{ friends: ['B'], name: 'A' }, { friends: ['A', 'C'], name: 'B' }, { friends: ['A'], name: 'C' }]"
*/

MATCH (a:person)-[:knows]->(b:person) RETURN a.name AS name, collect(b.name) AS friends GROUP BY a.name ORDER BY name
