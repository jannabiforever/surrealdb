/**
[env]
namespace = true
database = true
imports = ["opengql/_schema.surql"]

[test]
reason = "REMOVE unsets a matched node's property; the record survives and RETURN still projects it."

[[test.results]]
value = "[{ name: 'A' }]"
*/

MATCH (n:person WHERE n.name = 'A') REMOVE n.age RETURN n.name AS name
