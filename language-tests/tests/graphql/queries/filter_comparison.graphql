/**
[env]
imports = ["../_schema.surql"]

[test]
reason = "GraphQL filter comparison operators (gt, lt, gte, lte) on numeric fields"

[[test.results]]
value = "{ overTwentyEight: [{ name: 'Alice' }, { name: 'Carol' }], popular: [{ title: 'Hello world' }, { title: 'Intro to GraphQL' }], thirtyOrOlder: [{ name: 'Alice' }, { name: 'Carol' }], underThirty: [{ name: 'Bob' }] }"
*/
query {
	overTwentyEight: persons(filter: {age: {gt: 28}}) {
		name
	}
	underThirty: persons(filter: {age: {lt: 30}}) {
		name
	}
	thirtyOrOlder: persons(filter: {age: {gte: 30}}) {
		name
	}
	popular: posts(filter: {views: {gte: 42}}) {
		title
	}
}
