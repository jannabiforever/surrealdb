/**
[env]
imports = ["../_schema.surql"]

[graphql]
operation = "OnlyBob"

[test]
reason = "The [graphql] operation key selects which named operation executes"

[[test.results]]
value = "{ person: { name: 'Bob' } }"
*/
query OnlyAlice {
	person(id: "alice") {
		name
	}
}

query OnlyBob {
	person(id: "bob") {
		name
	}
}
